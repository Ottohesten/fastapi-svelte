name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run backend tests in isolated containers
        run: >-
          ./scripts/test-backend.sh
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=70

  frontend-tests:
    name: Frontend checks and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun ci

      - name: Check Svelte and TypeScript
        run: bun run check

      - name: Run frontend unit tests
        run: bun run test:unit

      - name: Build frontend
        run: bun run build
