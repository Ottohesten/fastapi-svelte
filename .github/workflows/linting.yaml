name: Code linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    # This is an existing required ruleset check. Keep the name stable: the
    # backend test step below makes test success part of the merge gate.
    name: Check code formatting
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --locked
        working-directory: ./backend
      - name: ruff check
        run: uv run ruff check .
        working-directory: ./backend

      - name: ruff format
        run: uv run ruff format --check .
        working-directory: ./backend

      - name: Run isolated backend tests with coverage
        run: >-
          ./scripts/test-backend.sh
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=70
