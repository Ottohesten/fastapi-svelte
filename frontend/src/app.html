<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Internationaleregler</title>
        <meta name="theme-color" content="#ffffff" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            // Set theme class before app mounts to avoid FOUC
            (function () {
                try {
                    var ls = localStorage.getItem("theme");
                    var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                    var followsSystem = !ls || ls === "system";
                    var dark = ls === "dark" || (followsSystem && systemDark);
                    document.documentElement.classList.toggle("dark", dark);
                    document.documentElement.style.colorScheme = dark ? "dark" : "light";

                    var themeColor = document.querySelector('meta[name="theme-color"]');
                    if (themeColor) {
                        themeColor.setAttribute("content", dark ? "#0b1220" : "#ffffff");
                    }
                } catch (e) {
                    /* noop */
                }
            })();
        </script>
        %sveltekit.head%
    </head>

    <body data-sveltekit-preload-data="hover">
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
